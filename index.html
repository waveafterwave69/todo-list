<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=NTR&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="./img/logo.png">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <title>todo list</title>
</head>

<body>
    <div class="dark-theme" data-aos="fade-down" data-aos-duration="500">
        <div class="container">
            <button class="dark-theme-btn moon"><img src="./img/moon.png" alt="" class="dark-theme-img"></button>
        </div>
    </div>
    <div class="content">
        <header class="header">
            <div class="container">
                <div class="content-header" data-aos="fade-up" data-aos-duration="500">
                    <div class="content-header-row">
                        <h1 class="content-header-title">TO DO list</h1>
                        <button class="main-content-header-btn"><img src="./img/edit-pen.png" alt=""
                                class="main-content-header-img"></button>
                    </div>
                </div>
            </div>
        </header>
        <main class="main" data-aos="fade-up" data-aos-duration="500">
            <div class="container">
                <div class="content-main">
                    <ul class="content-main-column">
                    </ul>
                    <button class="add-btn" onclick="addTask()">+</button>
                </div>
            </div>
        </main>

    </div>
    </div>
    <script src="./js/main.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
